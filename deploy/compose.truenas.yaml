# TrueNAS SCALE / Dockge deploy. Pulls the image built by GitHub Actions (GHCR).
# Image owner is marc-korte; change it if you fork.
services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: osr-map-maker-tailscale
    hostname: osr-map-maker            # -> https://osr-map-maker.<your-tailnet>.ts.net
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_EXTRA_ARGS=--accept-dns=false
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /mnt/Pool-0/osr-map-maker/tailscale-serve.json:/config/serve.json:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - app-network

  web:
    image: ghcr.io/marc-korte/osr-map-maker:latest
    container_name: osr-map-maker-web
    restart: unless-stopped
    depends_on:
      - tailscale
    # Uncomment to ALSO reach it on the LAN at http://<NAS-IP>:8089
    # ports:
    #   - "8089:80"
    networks:
      - app-network
    labels:
      - "com.centurylinklabs.watchtower.scope=osr-map-maker"   # only needed if using watchtower below

  # Optional: auto-pull the new :latest image after each push (no manual redeploy).
  # watchtower:
  #   image: containrrr/watchtower:latest
  #   container_name: osr-map-maker-watchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 300 --cleanup --scope osr-map-maker
  #   labels:
  #     - "com.centurylinklabs.watchtower.scope=osr-map-maker"

networks:
  app-network:
    driver: bridge

volumes:
  tailscale-state:
